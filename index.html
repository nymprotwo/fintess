<html lang="ru">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Metal / granite palette */
  --bg: #111213;           /* тёмный металл */
  --sf: #18191b;           /* поверхность */
  --s2: #1e1f22;           /* поверхность 2 */
  --br: #2a2b2e;           /* граница */
  --br2: #333539;          /* граница акцент */

  --ac: #d4a843;           /* медь/латунь — главный акцент */
  --ad: rgba(212,168,67,.1);
  --ab: rgba(212,168,67,.28);

  --or: #b85c38;           /* ржавчина */
  --pu: #7c5cbf;           /* тёмный фиолет */
  --re: #c0392b;           /* тёмный красный */
  --am: #c49a2a;           /* янтарь */
  --bl: #3a7bd5;

  --tx: #D8D9DC;           /* основной текст */
  --tx2: #F0F1F4;          /* заголовки — белый */
  --sb: #A0A2A8;           /* второстепенный — читаемый серый */
  --mt: #787A82;           /* приглушённый — читаемый */
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--tx); font-family:'JetBrains Mono',monospace; min-height:100vh; }
#app { max-width:430px; min-height:100vh; margin:0 auto; display:flex; flex-direction:column; position:relative;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,.01) 4px, rgba(255,255,255,.01) 5px),
    linear-gradient(160deg, #161718 0%, #111213 40%, #13120f 100%);
}
#screen { flex:1; overflow-y:auto; overflow-x:hidden; padding:16px 20px 100px; }
.fadein { animation: fadein .2s ease; }
@keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* NAV */
.nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(17,18,19,.98); border-top:1px solid var(--br); display:flex; padding:10px 0 20px; z-index:100; }
.nav button { flex:1; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--mt); transition:color .2s; padding:4px 0; }
.nav button.active { color:var(--ac); text-shadow:0 0 8px rgba(212,168,67,.4); }
.nav button .icon { font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center; width:24px; height:24px; }
.nav button .icon svg { width:22px; height:22px; }
.nav button .label2 { font-size:9px; letter-spacing:1px; font-family:'JetBrains Mono',monospace; }

/* TYPOGRAPHY */
.lbl { font-size:9px; letter-spacing:3px; color:var(--sb); margin-bottom:6px; display:block; }
.ttl { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; line-height:1; color:var(--tx2); }

/* CARDS */
.card { background:var(--sf); border:1px solid var(--br); border-top:1px solid var(--br2); border-radius:14px; padding:16px; margin-bottom:12px; }
.card-sm { background:var(--sf); border:1px solid var(--br); border-top:1px solid var(--br2); border-radius:10px; padding:12px 14px; }

/* BUTTONS */
.btn { border:none; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; gap:6px; transition:transform .1s; }
.btn:active { transform:scale(.97); }
.btn-accent { background:var(--ac); color:#000; padding:12px 20px; }
.btn-surface { background:var(--s2); color:var(--sb); border:1px solid var(--br); padding:10px 14px; }
.btn-ghost { background:transparent; color:var(--sb); border:1px solid var(--br); padding:8px 12px; }
.btn-full { width:100%; padding:14px; border-radius:12px; font-size:14px; }

/* SET TYPE BADGES */
.stb { padding:3px 0; border-radius:6px; text-align:center; font-size:8px; letter-spacing:.5px; cursor:pointer; user-select:none; border:1px solid transparent; transition:all .15s; }
.stb-work   { background:var(--ad); border-color:var(--ab); color:var(--ac); font-weight:700; }
.stb-warmup { background:#1a1a1a; border-color:#222; color:var(--sb); }
.stb-leadup { background:rgba(196,154,42,.1); border-color:rgba(196,154,42,.28); color:var(--am); }

/* CHIPS */
.chip { padding:7px 14px; border-radius:20px; border:1px solid var(--br); background:var(--sf); color:var(--mt); font-size:12px; cursor:pointer; font-family:'JetBrains Mono',monospace; display:inline-flex; align-items:center; gap:6px; }
.chip.active { border-color:var(--ac); background:var(--ad); color:var(--ac); }

/* PROGRESS BAR */
.pbar { height:5px; background:#1a1a1a; border-radius:3px; overflow:hidden; }
.pfil { height:100%; background:linear-gradient(90deg, #d4a843, #a07830); border-radius:3px; }

/* WEEK GRID */
.wgrid { display:flex; gap:5px; }
.wday { flex:1; text-align:center; }
.wblock { height:38px; border-radius:8px; margin-bottom:4px; display:flex; align-items:center; justify-content:center; border:1px solid var(--br); font-size:13px; }

/* TOGGLE */
.tgl { width:42px; height:24px; border-radius:12px; position:relative; cursor:pointer; flex-shrink:0; }
.tknob { width:18px; height:18px; border-radius:50%; position:absolute; top:3px; left:3px; transition:left .2s; }

/* NUMBER CONTROL */
.nctrl { display:flex; align-items:center; gap:2px; }
.ncbtn { background:#1a1a1a; border:none; color:var(--sb); border-radius:5px; width:20px; height:28px; cursor:pointer; font-size:16px; font-family:'JetBrains Mono',monospace; display:flex; align-items:center; justify-content:center; }
.ninput { background:var(--s2); border:1px solid var(--br); border-radius:8px; color:var(--tx2); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-align:center; width:100%; padding:5px 2px; outline:none; }
.ninput:focus { border-color:var(--ac); }

/* DOTS */
.dots { display:flex; justify-content:center; gap:6px; margin-top:16px; }
.dot { height:8px; border-radius:4px; border:none; cursor:pointer; padding:0; transition:all .2s; }
.dot-active { width:20px; background:var(--ac); }
.dot-done   { width:8px;  background:rgba(200,255,0,.35); }
.dot-idle   { width:8px;  background:var(--mt); }

/* SELECT */
select { background:var(--s2); border:1px solid var(--br); border-radius:8px; color:var(--tx2); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:5px 4px; cursor:pointer; outline:none; }
select:focus { border-color:var(--ac); }
select option { background:#1a1a1a; }

/* MODAL */
.modal-wrap { position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:200; display:flex; flex-direction:column; max-width:430px; left:50%; transform:translateX(-50%); animation:fadein .18s ease; }
.modal-hdr { display:flex; justify-content:space-between; align-items:center; padding:20px 20px 0; margin-bottom:16px; }
.modal-body { flex:1; overflow-y:auto; padding:0 20px 20px; }
.modal-close { background:var(--s2); border:1px solid var(--br); border-radius:8px; padding:6px 12px; color:var(--sb); cursor:pointer; font-size:16px; font-family:'JetBrains Mono',monospace; }

/* SCROLLBAR */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }

textarea { background:#111; border:1px solid var(--br); border-radius:12px; color:var(--tx2); font-family:'JetBrains Mono',monospace; font-size:13px; padding:12px 14px; outline:none; resize:none; width:100%; line-height:1.6; }
textarea:focus { border-color:var(--ac); }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
input[type=number] { -moz-appearance:textfield; }
</style>
</head>

function prevOf(id) {
  for (const group of Object.values(EXERCISES)) {
    const found = group.find(e => e.id === id);
    if (found) return found.prev;
  }
  return {w:60, r:8, s:3};
}
function exGrips(ex) {
  if (!ex.grips || ex.grips.length === 0) return GRIPS_LIST;
  return GRIPS_LIST.filter(g => ex.grips.includes(g.id));
}
function exEquip(ex) {
  if (!ex.equip || ex.equip.length === 0) return EQUIPMENT_LIST;
  return EQUIPMENT_LIST.filter(e => ex.equip.includes(e.id));
}

// ─────────────── HELPERS ───────────────
function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function workTonnage(ex) {
  return ex.sets.filter(s => s.type === 'work').reduce((a, s) => a + s.weight * s.reps, 0);
}
function prevTonnage(ex) {
  const p = prevOf(ex.id);
  return p.w * p.r * p.s;
}
function tonnageDiff(ex) {
  const wt = workTonnage(ex);
  const ws = ex.sets.filter(s => s.type === 'work');
  if (!wt || ws.length < prevOf(ex.id).s) return null;
  return wt - prevTonnage(ex);
}
function isRegress(ex) {
  const d = tonnageDiff(ex);
  return d !== null && d < -(prevTonnage(ex) * 0.05);
}
function hlColor(hl) {
  return hl === 'dark' ? 'var(--pu)' : hl === 'orange' ? 'var(--or)' : 'var(--ac)';
}
function tagColor(t) {
  if (t.includes('🖤')) return 'var(--pu)';
  if (t.includes('ГЗТ') || t.includes('предпочт')) return 'var(--or)';
  return 'var(--ac)';
}

// ─────────────── STORAGE ───────────────
const Storage = {
  saveTraining() {
    try {
      localStorage.setItem('sb_current', JSON.stringify({
        workout:    State.diary.workout,
        activeIdx:  State.diary.activeIdx,
        input:      State.diary.input,
        muscles:    State.diary.muscles,
        selections: State.diary.selections,
        plan:       State.diary.plan,
      }));
    } catch(e) {}
  },
  clearCurrent() {
    localStorage.removeItem('sb_current');
  },
  addHistory(entry) {
    try {
      const hist = this.getHistory();
      hist.unshift(entry);
      localStorage.setItem('sb_history', JSON.stringify(hist.slice(0, 50)));
    } catch(e) {}
  },
  getHistory() {
    try { return JSON.parse(localStorage.getItem('sb_history') || '[]'); } catch(e) { return []; }
  },
  restore() {
    try {
      const raw = localStorage.getItem('sb_current');
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (!data || !data.workout || !data.workout.length) return false;
      State.diary.workout    = data.workout;
      State.diary.activeIdx  = typeof data.activeIdx === 'number' ? data.activeIdx : -1;
      State.diary.input      = data.input || null;
      State.diary.muscles    = data.muscles || [];
      State.diary.selections = data.selections || {};
      State.diary.plan       = data.plan || [];
      State.diary.stage      = 'active';
      return true;
    } catch(e) { return false; }
  },
};

// ─────────────── APP ───────────────
const App = {
  nav(tab) {
    State.tab = tab;
    document.querySelectorAll('.nav button').forEach(b => {
      b.classList.toggle('active', b.id === 'nav-' + tab);
    });
    this.render();
  },

  render() {
    const sc = document.getElementById('screen');
    sc.innerHTML = '';
    sc.className = 'fadein';
    if (State.tab === 'workout')  sc.innerHTML = Screens.workout();
    if (State.tab === 'home')     sc.innerHTML = Screens.home();
    if (State.tab === 'programs') sc.innerHTML = Screens.programs();
    if (State.tab === 'bio')      sc.innerHTML = Screens.bio();
    this.renderModal();
    // Auto-save active training
    if (State.diary.stage === 'active' || State.diary.stage === 'regress_check') Storage.saveTraining();
  },

  renderModal() {
    const root = document.getElementById('modal-root');
    root.innerHTML = '';
    if (!State.modal) return;
    const fn = {swap: Modals.swap, note: Modals.note, program: Modals.program, dark: Modals.dark};
    if (fn[State.modal.type]) root.innerHTML = fn[State.modal.type]();
  },

  closeModal() {
    State.modal = null;
    document.getElementById('modal-root').innerHTML = '';
  },

  timerToggle() {
    const t = State.timer;
    if (t.on) {
      clearInterval(t._iv);
      t.on = false;
    } else {
      t.on = true;
      t._iv = setInterval(() => {
        t.sec++;
        const el = document.getElementById('timer-display');
        if (el) el.textContent = '⏸ ' + fmt(t.sec);
      }, 1000);
    }
    App.render();
  },

  timerReset() {
    clearInterval(State.timer._iv);
    State.timer = {on: false, sec: 0, _iv: null};
    App.render();
  },

  timerStart() {
    clearInterval(State.timer._iv);
    State.timer.sec = 0;
    State.timer.on  = true;
    State.timer._iv = setInterval(() => {
      State.timer.sec++;
      // Обновляем без полного рендера
      const ex = State.diary.workout[State.diary.activeIdx];
      const restSec = ex ? parseInt(ex.rest || '120') : 120;
      const el = document.getElementById('timer-display');
      if (el) el.textContent = fmt(Math.min(State.timer.sec, restSec));
    }, 1000);
  },
};

// ─────────────── DIARY ACTIONS ───────────────
const Diary = {
  toggleMuscle(m) {
    const ms = State.diary.muscles;
    State.diary.muscles = ms.includes(m) ? ms.filter(x => x !== m) : [...ms, m];
    App.render();
  },

  toggleExercise(muscle, exId) {
    const sel = State.diary.selections;
    const cur = sel[muscle] || [];
    sel[muscle] = cur.includes(exId) ? cur.filter(x => x !== exId) : [...cur, exId];
    App.render();
  },

  buildWorkout() {
    const blocks = [];
    State.diary.muscles.forEach(muscle => {
      (State.diary.selections[muscle] || []).forEach(exId => {
        const ex = (EXERCISES[muscle] || []).find(e => e.id === exId);
        if (ex) blocks.push({
          id: ex.id, name: ex.name, muscle,
          grip: (ex.grips && ex.grips[0]) || 'medium', equip: (ex.equip && ex.equip[0]) || 'barbell', tut: 'normal', rest: '120',
          accent: (ex.accents && ex.accents[0]) || null,
          equipChosen: true, gripChosen: true, setupDone: false,
          sets: [], note: '',
        });
      });
    });
    if (!blocks.length) return;
    State.diary.workout = blocks;
    State.diary.activeIdx = 0;
    State.diary.stage = 'active';
    App.render();
  },

  addSet() {
    const ex  = State.diary.workout[State.diary.activeIdx];
    const inp = State.diary.input || { type: 'work', weight: 0, reps: 1, rpe: null };
    ex.sets.push({ type: inp.type, weight: inp.weight, reps: inp.reps, rpe: inp.rpe });
    const p  = prevOf(ex.id);
    const n  = ex.sets.length;
    const ck = [ex.id, ex.equip, ex.grip, ex.accent, ex.tut !== 'normal' ? ex.tut : null].filter(Boolean).join('_');
    const h  = HISTORY[ck] || null;
    if (n === 1) {
      // добавили разминку → предлагаем подводящий из истории
      const hl = h ? h.sets.find(s => s.type === 'leadup') : null;
      State.diary.input = { type:'leadup', weight: hl ? hl.weight : Math.round(p.w*.75/2.5)*2.5, reps: hl ? hl.reps : 6, rpe:null };
    } else if (n === 2) {
      // добавили подводящий → предлагаем первый рабочий из истории
      const hw = h ? h.sets.filter(s => s.type === 'work') : [];
      State.diary.input = { type:'work', weight: hw.length ? hw[0].weight : p.w, reps: hw.length ? hw[0].reps : p.r, rpe:null };
    } else {
      // ещё рабочие → то же, что только что ввёл
      const lw = [...ex.sets].reverse().find(s => s.type === 'work');
      State.diary.input = { type:'work', weight: lw ? lw.weight : inp.weight, reps: lw ? lw.reps : inp.reps, rpe:null };
    }
    App.timerStart();
    App.render();
  },

  updateInput(field, val) {
    if (!State.diary.input) State.diary.input = { type: 'work', weight: 0, reps: 1, rpe: null };
    State.diary.input[field] = val;
    App.render();
  },

  cycleInputType() {
    const types = ['warmup', 'leadup', 'work'];
    const inp = State.diary.input;
    if (!inp) return;
    inp.type = types[(types.indexOf(inp.type) + 1) % types.length];
    App.render();
  },

  cycleInputRpe() {
    const vals = [null, 6, 7, 8, 9, 10];
    const inp = State.diary.input;
    if (!inp) return;
    inp.rpe = vals[(vals.indexOf(inp.rpe) + 1) % vals.length];
    App.render();
  },

  cycleRpe(si) {
    const s = State.diary.workout[State.diary.activeIdx].sets[si];
    const vals = [null, 6, 7, 8, 9, 10];
    s.rpe = vals[(vals.indexOf(s.rpe) + 1) % vals.length];
    App.render();
  },

  updateSet(si, field, val) {
    State.diary.workout[State.diary.activeIdx].sets[si][field] = val;
    App.render();
  },

  updateExField(field, val) {
    const ex = State.diary.workout[State.diary.activeIdx];
    ex[field] = val;
    if (field === 'equip') ex.equipChosen = true;
    if (field === 'grip') ex.gripChosen = true;
    App.render();
  },

  startExercise() {
    const ex = State.diary.workout[State.diary.activeIdx];
    ex.setupDone = true;
    const p  = prevOf(ex.id);
    const ck = [ex.id, ex.equip, ex.grip, ex.accent, ex.tut !== 'normal' ? ex.tut : null].filter(Boolean).join('_');
    const h  = HISTORY[ck] || null;
    const hw = h ? h.sets.find(s => s.type === 'warmup') : null;
    // Инициализируем форму из истории (если есть) или дефолт
    State.diary.input = {
      type:   'warmup',
      weight: hw ? hw.weight : Math.round(p.w * 0.5 / 2.5) * 2.5,
      reps:   hw ? hw.reps   : 12,
      rpe:    null,
    };
    App.render();
  },

  removeSet(si) {
    State.diary.workout[State.diary.activeIdx].sets.splice(si, 1);
    if (State.diary.rowEditIdx === si) State.diary.rowEditIdx = -1;
    App.render();
  },

  toggleRowEditMode() {
    State.diary.rowEditMode = !State.diary.rowEditMode;
    State.diary.rowEditIdx  = -1;
    App.render();
  },

  openRowEdit(si) {
    State.diary.rowEditIdx = State.diary.rowEditIdx === si ? -1 : si;
    App.render();
  },

  updateSetField(si, field, val) {
    const s = State.diary.workout[State.diary.activeIdx].sets[si];
    s[field] = val;
    App.render();
  },

  setRpeForRow(si, val) {
    const s = State.diary.workout[State.diary.activeIdx].sets[si];
    s.rpe = s.rpe === val ? null : val;
    App.render();
  },

  cycleSetType(si) {
    const types = ['warmup', 'leadup', 'work'];
    const ex = State.diary.workout[State.diary.activeIdx];
    const cur = ex.sets[si].type;
    ex.sets[si].type = types[(types.indexOf(cur) + 1) % types.length];
    App.render();
  },

  goTo(idx) {
    State.diary.activeIdx = idx;
    App.render();
  },

  swapExercise(newId, muscle) {
    const newEx = (EXERCISES[muscle] || []).find(e => e.id === newId);
    if (!newEx) return;
    State.diary.workout[State.diary.activeIdx] = {
      id: newEx.id, name: newEx.name, muscle,
      grip: (newEx.grips && newEx.grips[0]) || 'medium', equip: (newEx.equip && newEx.equip[0]) || 'barbell', tut: 'normal', rest: '120',
      accent: (newEx.accents && newEx.accents[0]) || null,
      equipChosen: true, gripChosen: true, setupDone: false,
      sets: [], note: '',
    };
    App.closeModal();
    App.render();
  },

  saveNote(txt) {
    State.diary.workout[State.diary.activeIdx].note = txt;
    App.closeModal();
    App.render();
  },

  finish() {
    // Считаем общий тоннаж текущей тренировки (все подходы)
    const curTon = State.diary.workout.reduce((a, e) =>
      a + e.sets.reduce((s, set) => s + set.weight * set.reps, 0), 0);

    // Считаем суммарный исторический тоннаж по тем же упражнениям
    let histTon = 0;
    State.diary.workout.forEach(ex => {
      const ck = [ex.id, ex.equip, ex.grip, ex.accent, ex.tut !== 'normal' ? ex.tut : null].filter(Boolean).join('_');
      const h = HISTORY[ck];
      if (h) histTon += h.sets.reduce((s, set) => s + set.weight * set.reps, 0);
    });

    // Если тоннаж значительно ниже (>12%) → показать экран "что повлияло"
    if (histTon > 0 && curTon > 0 && curTon < histTon * 0.88) {
      State.diary._regressData = { curTon, histTon, reasons: [] };
      State.diary.stage = 'regress_check';
      App.render();
      return;
    }

    Diary._doFinish();
  },

  _doFinish() {
    // Save to history only if at least one set was performed
    const totalSets = State.diary.workout.reduce((a, e) => a + e.sets.length, 0);
    if (totalSets > 0) {
      const totalTon = State.diary.workout.reduce((a, e) =>
        a + e.sets.reduce((s, set) => s + set.weight * set.reps, 0), 0);
      const d = new Date();
      const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
      const dateStr = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
      Storage.addHistory({
        date:          dateStr,
        ts:            Date.now(),
        exerciseCount: State.diary.workout.length,
        totalTonnage:  totalTon,
        exercises:     State.diary.workout.map(ex => ({ name: ex.name, workSets: ex.sets.filter(s => s.type === 'work').length })),
      });
    }
    Storage.clearCurrent();
    State.diary.stage        = 'browse';
    State.diary.muscles      = [];
    State.diary.selections   = {};
    State.diary.plan         = [];
    State.diary.workout      = [];
    State.diary.activeIdx    = 0;
    State.diary._regressData = null;
    App.render();
  },

  saveRegressReasons(reasons) {
    // Сохраняем причины (в будущем — в историю или на сервер)
    if (State.diary._regressData) {
      State.diary._regressData.reasons = reasons;
      // TODO: persist to HISTORY or analytics storage
    }
    Diary._doFinish();
  },

  // ── Selector helpers ──────────────────────────
  selectorSetMuscle(muscle) {
    State.selector = { muscle, categoryId: null, typeId: null, equip: null, accent: null, grip: null };
    App.render();
  },
  selectorSetCategory(catId) {
    State.selector.categoryId = catId;
    State.selector.typeId = null;
    State.selector.equip = null;
    State.selector.accent = null;
    State.selector.grip = null;
    App.render();
  },
  selectorSetType(typeId) {
    State.selector.typeId = typeId;
    State.selector.equip = null;
    State.selector.accent = null;
    State.selector.grip = null;
    App.render();
  },
  selectorSetEquip(equip) { State.selector.equip = equip; App.render(); },
  selectorSetAccent(accent) { State.selector.accent = accent; App.render(); },
  selectorSetGrip(grip) { State.selector.grip = grip; App.render(); },

  addToPlan() {
    const sel = State.selector;
    const categories = MOVEMENT_TREE[sel.muscle] || null;
    let exId, equip, accent, grip;
    if (categories) {
      // Tree-based selection
      const cat = categories.find(c => c.id === sel.categoryId);
      if (!cat) return;
      const type = cat.types.find(t => t.id === sel.typeId);
      if (!type) return;
      // exId: либо фиксированный (хаммер), либо определяется акцентом (скамья/смит)
      if (type.exId) {
        exId = type.exId;
      } else if (type.accents && sel.accent) {
        const accentObj = type.accents.find(a => a.id === sel.accent);
        exId = accentObj ? accentObj.exId : null;
      }
      if (!exId) return;
      // equip: фиксированный снаряд или выбор пользователя
      equip  = type.fixedEquip || sel.equip || (type.equips && type.equips[0]) || 'barbell';
      accent = sel.accent || null;
      const tg = type.grips || [];
      grip = sel.grip || (tg.includes('medium') ? 'medium' : tg[0]) || 'medium';
    } else {
      // Flat fallback: typeId = exId
      exId   = sel.typeId;
      const exData = Object.values(EXERCISES).flat().find(e => e.id === exId);
      if (!exData) return;
      equip  = sel.equip  || (exData.equip  && exData.equip[0])  || 'barbell';
      accent = sel.accent || (exData.accents && exData.accents[0]) || null;
      grip   = sel.grip   || (exData.grips   && exData.grips[0])  || 'medium';
    }
    const exData = Object.values(EXERCISES).flat().find(e => e.id === exId);
    if (!exData) return;
    if (!grip) grip = (exData.grips && exData.grips[0]) || 'medium';
    State.diary.plan.push({ exId, name: exData.name, muscle: sel.muscle, equip, accent, grip });
    // Reset type/equip/accent but keep muscle+category for fast re-add
    State.selector.typeId = null;
    State.selector.equip  = null;
    State.selector.accent = null;
    State.selector.grip   = null;
    App.render();
  },

  removeFromPlan(idx) {
    State.diary.plan.splice(idx, 1);
    App.render();
  },

  movePlan(idx, dir) {
    const plan = State.diary.plan;
    const to = idx + dir;
    if (to < 0 || to >= plan.length) return;
    [plan[idx], plan[to]] = [plan[to], plan[idx]];
    App.render();
  },

  startWorkout() {
    const blocks = State.diary.plan.map(p => ({
      id: p.exId, name: p.name, muscle: p.muscle,
      equip: p.equip, grip: p.grip, tut: 'normal', rest: '120',
      accent: p.accent,
      equipChosen: true, gripChosen: true, setupDone: false,
      sets: [], note: '',
    }));
    if (!blocks.length) return;
    State.diary.workout = blocks;
    State.diary.activeIdx = -1;  // -1 = список, пользователь выбирает с чего начать
    State.diary.stage = 'active';
    App.render();
  },
};

  },

  // ═══════════════════════════════════════════════
  // ЭКРАН ВЫБОРА УПРАЖНЕНИЙ (иерархический)
  // ═══════════════════════════════════════════════
  workoutSelect() {
    const sel  = State.selector;
    const plan = State.diary.plan;
    const chip = (label, active, onclick, extra) =>
      '<button onclick="' + onclick + '" style="padding:9px 16px;border-radius:20px;border:1px solid ' +
      (active ? 'var(--ac)' : 'var(--br)') + ';background:' + (active ? 'var(--ad)' : 'var(--sf)') +
      ';color:' + (active ? 'var(--ac)' : 'var(--tx)') + ';font-size:13px;font-weight:' + (active ? '700' : '400') +
      ';cursor:pointer;font-family:inherit;' + (extra || '') + '">' + label + '</button>';

    let html = '';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">';
    html += '<button class="btn btn-ghost" onclick="State.diary.stage=\'browse\';App.render()">‹</button>';
    html += '<div><span class="lbl">КОНСТРУКТОР</span><div class="ttl" style="font-size:26px">Добавить упражнение</div></div>';
    html += '</div>';

    // ── Шаг 1: Мышца ──────────────────────────────
    html += '<div style="margin-bottom:20px">';
    html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">МЫШЦА</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
    MUSCLES.forEach(m => {
      html += chip(m, sel.muscle === m, 'Diary.selectorSetMuscle(\'' + m + '\')');
    });
    html += '</div></div>';

    if (sel.muscle) {
      const categories = MOVEMENT_TREE[sel.muscle] || null;

      if (categories) {
        // ── Шаг 2: Категория движения ─────────────
        html += '<div style="margin-bottom:20px">';
        html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">ДВИЖЕНИЕ</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
        categories.forEach(cat => {
          html += chip(cat.name, sel.categoryId === cat.id, 'Diary.selectorSetCategory(\'' + cat.id + '\')');
        });
        html += '</div></div>';

        if (sel.categoryId) {
          const cat = categories.find(c => c.id === sel.categoryId);
          if (cat) {
            // ── Шаг 3: Тип ──────────────────────────
            html += '<div style="margin-bottom:20px">';
            html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">ТИП</div>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
            cat.types.forEach(t => {
              html += chip(t.name, sel.typeId === t.id, 'Diary.selectorSetType(\'' + t.id + '\')');
            });
            html += '</div></div>';

            if (sel.typeId) {
              const type = cat.types.find(t => t.id === sel.typeId);
              if (type) {

                // ── Шаг 4: Постановка рук (отжимания) ─
                if (type.grips && type.grips.length > 0) {
                  html += '<div style="margin-bottom:20px">';
                  html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">ПОСТАНОВКА РУК</div>';
                  html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
                  type.grips.forEach(gId => {
                    const g = GRIPS_LIST.find(x => x.id === gId);
                    if (g) html += chip(g.name, sel.grip === gId, 'Diary.selectorSetGrip(\'' + gId + '\')');
                  });
                  html += '</div></div>';
                }

                // ── Шаг 4: Акцент / Угол наклона ──────
                if (type.accents && type.accents.length > 0) {
                  html += '<div style="margin-bottom:20px">';
                  html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">АКЦЕНТ</div>';
                  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
                  type.accents.forEach(ac => {
                    const isOn = sel.accent === ac.id;
                    html += '<button onclick="Diary.selectorSetAccent(\'' + ac.id + '\')" style="padding:9px 16px;border-radius:20px;border:1px solid ' +
                      (isOn ? 'var(--ac)' : 'var(--br)') + ';background:' + (isOn ? 'var(--ad)' : 'var(--sf)') +
                      ';color:' + (isOn ? 'var(--ac)' : 'var(--tx)') + ';font-size:13px;font-weight:' + (isOn ? '700' : '400') +
                      ';cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px">' +
                      '<span>' + ac.name + '</span>' +
                      (ac.sub ? '<span style="font-size:9px;font-weight:400;opacity:.6;letter-spacing:0">' + ac.sub + '</span>' : '') +
                      '</button>';
                  });
                  html += '</div></div>';
                }

                // ── Шаг 5: Снаряд (сразу если нет акцентов, иначе после акцента) ──
                if ((!type.accents || type.accents.length === 0 || sel.accent) && type.equips && type.equips.length > 1) {
                  html += '<div style="margin-bottom:20px">';
                  html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">СНАРЯД</div>';
                  html += '<div style="display:flex;flex-wrap:wrap;gap:7px">';
                  type.equips.forEach(eqId => {
                    const eq = EQUIPMENT_LIST.find(e => e.id === eqId);
                    if (eq) html += chip(eq.name, sel.equip === eqId, 'Diary.selectorSetEquip(\'' + eqId + '\')');
                  });
                  html += '</div></div>';
                }

                // ── Кнопка Добавить ───────────────────
                const needsAccent = type.accents && type.accents.length > 0 && !sel.accent;
                const needsEquip  = !needsAccent && type.equips && type.equips.length > 1 && !type.fixedEquip && !sel.equip;
                const needsGrip   = type.grips && type.grips.length > 0 && !sel.grip;
                const canAdd = !needsAccent && !needsEquip && !needsGrip;
                html += '<button ' + (canAdd ? 'onclick="Diary.addToPlan()"' : 'disabled') +
                  ' style="width:100%;padding:15px;border-radius:14px;border:none;cursor:' + (canAdd ? 'pointer' : 'not-allowed') +
                  ';font-family:inherit;font-size:14px;font-weight:700;background:' +
                  (canAdd ? 'linear-gradient(135deg,var(--ac),#a07830);color:#000' : '#1a1a1a;color:#787A82') +
                  ';margin-bottom:16px">+ Добавить в план</button>';
              }
            }
          }
        }
      } else {
        // ── Фоллбэк для мышц без дерева ──────────
        html += '<div style="margin-bottom:20px">';
        html += '<div style="font-size:9px;color:var(--sb);letter-spacing:3px;margin-bottom:8px">УПРАЖНЕНИЕ</div>';
        (EXERCISES[sel.muscle] || []).forEach(ex => {
          const p = prevOf(ex.id);
          html += '<button onclick="Diary.selectorSetType(\'' + ex.id + '\')" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid ' +
            (sel.typeId === ex.id ? 'var(--ac)' : 'var(--br)') + ';background:' +
            (sel.typeId === ex.id ? 'var(--ad)' : 'var(--sf)') + ';text-align:left;cursor:pointer;font-family:inherit;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
          html += '<div style="font-size:13px;font-weight:600;color:' + (sel.typeId === ex.id ? 'var(--ac)' : 'var(--tx)') + '">' + ex.name + '</div>';
          html += '<div style="font-size:10px;color:var(--sb)">' + p.w + '×' + p.r + '</div></button>';
        });
        html += '</div>';

        if (sel.typeId) {
          html += '<button onclick="Diary.addToPlan()" style="width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--ac),#a07830);color:#000;margin-bottom:16px">+ Добавить в план</button>';
        }
      }
    }

    // ── Текущий план (снизу) ──────────────────────
    if (plan.length > 0) {
      html += '<div style="border-top:1px solid var(--br);padding-top:16px;margin-top:8px">';
      html += '<span class="lbl" style="margin-bottom:10px;display:block">ПЛАН · ' + plan.length + ' упр</span>';
      plan.forEach((p, i) => {
        const eq = EQUIPMENT_LIST.find(e => e.id === p.equip);
        const ac = ACCENT_LIST.find(a => a.id === p.accent);
        html += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #111">';
        html += '<div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--tx)">' + p.name + '</div>';
        if (eq || ac) {
          html += '<div style="display:flex;gap:5px;margin-top:4px">';
          if (eq) html += '<span style="padding:1px 6px;border-radius:5px;border:1px solid var(--br);font-size:9px;color:var(--am)">' + eq.name + '</span>';
          if (ac) html += '<span style="padding:1px 6px;border-radius:5px;border:1px solid var(--br);font-size:9px;color:var(--am)">' + ac.name + '</span>';
          html += '</div>';
        }
        html += '</div>';
        html += '<button onclick="Diary.removeFromPlan(' + i + ')" style="background:none;border:none;color:#333;cursor:pointer;font-size:15px;padding:4px">✕</button>';
        html += '</div>';
      });
      html += '<button onclick="Diary.startWorkout()" style="width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--ac),#a07830);color:#000;margin-top:14px">▶ Начать тренировку</button>';
      html += '</div>';
    }

    return html;
  },

  // ═══════════════════════════════════════════════
  // ЭКРАН ПЛАНА ТРЕНИРОВКИ
  // ═══════════════════════════════════════════════
  workoutPlan() {
    const plan = State.diary.plan;
    let html = '';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">';
    html += '<button class="btn btn-ghost" onclick="State.diary.stage=\'select\';App.render()">‹</button>';
    html += '<div><span class="lbl">ТРЕНИРОВКА</span><div class="ttl" style="font-size:26px">План</div></div>';
    html += '</div>';

    if (!plan.length) {
      html += '<div style="text-align:center;padding:40px 0;color:var(--mt)">';
      html += '<div style="font-size:32px;margin-bottom:12px">📋</div>';
      html += '<div style="font-size:14px;margin-bottom:8px">Список пустой</div>';
      html += '<div style="font-size:12px;color:var(--sb)">Добавь упражнения через конструктор</div>';
      html += '</div>';
      html += '<button onclick="State.diary.stage=\'select\';App.render()" class="btn btn-accent btn-full" style="border-radius:14px;font-size:14px;padding:14px">+ Добавить упражнение</button>';
      return html;
    }

    plan.forEach((p, i) => {
      const eq = EQUIPMENT_LIST.find(e => e.id === p.equip);
      const ac = ACCENT_LIST.find(a => a.id === p.accent);
      html += '<div style="background:var(--sf);border:1px solid var(--br);border-top:1px solid var(--br2);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:10px">';
      html += '<div style="display:flex;flex-direction:column;gap:4px">';
      html += '<button onclick="Diary.movePlan(' + i + ',-1)" ' + (i===0 ? 'disabled' : '') + ' style="background:var(--s2);border:1px solid var(--br);border-radius:6px;width:28px;height:26px;cursor:' + (i===0?'not-allowed':'pointer') + ';color:' + (i===0?'var(--mt)':'var(--sb)') + ';font-size:13px">↑</button>';
      html += '<button onclick="Diary.movePlan(' + i + ',1)" ' + (i===plan.length-1 ? 'disabled' : '') + ' style="background:var(--s2);border:1px solid var(--br);border-radius:6px;width:28px;height:26px;cursor:' + (i===plan.length-1?'not-allowed':'pointer') + ';color:' + (i===plan.length-1?'var(--mt)':'var(--sb)') + ';font-size:13px">↓</button>';
      html += '</div>';
      html += '<div style="flex:1">';
      html += '<div style="font-size:13px;font-weight:700;color:var(--tx2)">' + p.name + '</div>';
      html += '<div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">';
      if (eq) html += '<span style="padding:2px 8px;border-radius:6px;border:1px solid var(--br);background:#0f1011;font-size:9px;color:var(--am)">' + eq.name + '</span>';
      if (ac) html += '<span style="padding:2px 8px;border-radius:6px;border:1px solid var(--br);background:#0f1011;font-size:9px;color:var(--am)">' + ac.name + '</span>';
      html += '<span style="padding:2px 8px;border-radius:6px;border:1px solid #1a1a2a;background:#0f0f14;font-size:9px;color:var(--sb)">' + p.muscle + '</span>';
      html += '</div></div>';
      html += '<button onclick="Diary.removeFromPlan(' + i + ')" style="background:none;border:none;color:#333;cursor:pointer;font-size:16px;padding:4px">✕</button>';
      html += '</div>';
    });

    html += '<div style="display:flex;gap:8px;margin-top:4px">';
    html += '<button onclick="State.diary.stage=\'select\';App.render()" class="btn btn-surface" style="flex:1;padding:13px">+ Ещё</button>';
    html += '<button onclick="Diary.startWorkout()" class="btn btn-accent" style="flex:2;padding:13px;border-radius:12px;font-size:14px">▶ Начать тренировку</button>';
    html += '</div>';

    return html;
  },

  workoutBuild() {
    const sel = State.diary.selections;
    const active = State.diary.muscles;
    const total = Object.values(sel).flat().length;

    let html = '<button class="btn btn-ghost" style="margin-bottom:16px" onclick="State.diary.stage=\'browse\';App.render()">‹ Назад</button>';
    html += '<span class="lbl">КОНСТРУКТОР</span>';
    html += '<div class="ttl" style="margin-bottom:4px">Что тренируем?</div>';
    html += '<div style="font-size:12px;color:var(--sb);margin-bottom:18px">Мышцы → упражнения</div>';

    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">';
    MUSCLES.forEach(m => {
      const cnt = (sel[m] || []).length;
      const on = active.includes(m);
      html += '<button class="chip' + (on ? ' active' : '') + '" onclick="Diary.toggleMuscle(\'' + m + '\')">' + m;
      if (cnt > 0) html += '<span style="background:var(--ac);color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">' + cnt + '</span>';
      html += '</button>';
    });
    html += '</div>';

    active.forEach(muscle => {
      html += '<div style="margin-bottom:16px">';
      html += '<div style="font-size:9px;color:var(--ac);letter-spacing:2px;margin-bottom:8px">' + muscle.toUpperCase() + '</div>';
      (EXERCISES[muscle] || []).forEach(ex => {
        const selected = (sel[muscle] || []).includes(ex.id);
        const f = ex.last > 30;
        const p = prevOf(ex.id);
        html += '<button style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid ' + (selected ? 'var(--ac)' : 'var(--br)') + ';background:' + (selected ? 'var(--ad)' : 'var(--sf)') + ';text-align:left;cursor:pointer;font-family:inherit;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center" onclick="Diary.toggleExercise(\'' + muscle + '\',\'' + ex.id + '\')">';
        html += '<div><div style="font-size:13px;font-weight:600;color:' + (selected ? 'var(--ac)' : '#ccc') + '">' + ex.name;
        if (f) html += '<span style="font-size:9px;color:var(--am);border:1px solid rgba(245,158,11,.25);border-radius:4px;padding:1px 5px;margin-left:6px">ДАВНО</span>';
        html += '</div><div style="font-size:10px;color:var(--sb);margin-top:2px">Прошлый: ' + p.w + 'кг×' + p.r + ' · ' + p.s + ' подх</div></div>';
        html += '<div style="width:22px;height:22px;border-radius:50%;border:1.5px solid ' + (selected ? 'var(--ac)' : '#333') + ';background:' + (selected ? 'var(--ac)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:11px;color:' + (selected ? '#000' : '#333') + ';flex-shrink:0">' + (selected ? '✓' : '') + '</div>';
        html += '</button>';
      });
      html += '</div>';
    });

    if (total > 0) {
      html += '<button class="btn btn-accent btn-full" style="border-radius:14px;font-size:14px;margin-top:8px" onclick="Diary.buildWorkout()">▶ Начать — ' + total + ' упражнений</button>';
    }
    return html;
  },

  workoutActive() {
    const d = State.diary;

    // ── Список упражнений (пользователь выбирает с чего начать) ──
    if (d.activeIdx === -1) {
      // Считаем прогресс для шапки
      const doneCount = d.workout.filter(w => w.setupDone && w.sets.filter(s=>s.type==='work').length > 0).length;
      const totalCount = d.workout.length;

      let html = '';

      // Шапка
      html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
      html += '<button class="btn btn-ghost" onclick="State.diary.stage=\'select\';App.render()">‹</button>';
      html += '<div><span class="lbl">ТРЕНИРОВКА</span>';
      html += '<div class="ttl" style="font-size:28px">Текущая тренировка</div></div>';
      html += '</div>';

      // Прогресс + подсказка
      html += '<div style="background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between">';
      html += '<div style="font-size:12px;color:var(--sb)">👇 Нажми на упражнение, чтобы начать</div>';
      html += '<div style="font-size:13px;font-weight:700;color:' + (doneCount === totalCount && totalCount > 0 ? '#4a8a4a' : 'var(--ac)') + '">' + doneCount + ' / ' + totalCount + '</div>';
      html += '</div>';

      d.workout.forEach((w, i) => {
        const eq = EQUIPMENT_LIST.find(e => e.id === w.equip);
        const ac = ACCENT_LIST.find(a => a.id === w.accent);
        const workSets = w.sets.filter(s => s.type === 'work').length;

        // Статус
        const isDone    = w.setupDone && workSets > 0;
        const isActive  = w.setupDone && workSets === 0;
        // idle = !w.setupDone

        let cardBg     = 'var(--sf)';
        let cardBorder = 'var(--br)';
        let nameColor  = 'var(--tx2)';
        let opacity    = '1';
        let statusEl   = '';

        if (isDone) {
          // ● Зелёный — завершено
          cardBg     = '#121a12';
          cardBorder = 'rgba(72,130,72,.35)';
          nameColor  = '#7a9a7a';
          opacity    = '.75';
          statusEl   = '<div style="width:14px;height:14px;border-radius:50%;background:#4a8a4a;box-shadow:0 0 8px rgba(72,160,72,.4);flex-shrink:0"></div>';
        } else if (isActive) {
          // ● Жёлтый — в процессе
          cardBorder = 'rgba(212,168,67,.4)';
          cardBg     = 'rgba(212,168,67,.04)';
          statusEl   = '<div style="width:14px;height:14px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px rgba(212,168,67,.5);flex-shrink:0"></div>';
        } else {
          // ○ Серый — не начато
          cardBorder = 'var(--br)';
          statusEl   = '<div style="width:14px;height:14px;border-radius:50%;background:transparent;border:2px solid #3a3c40;flex-shrink:0"></div>';
        }

        html += '<button onclick="Diary.goTo(' + i + ')" style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid ' + cardBorder + ';background:' + cardBg + ';text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px;display:flex;align-items:center;gap:12px;opacity:' + opacity + ';transition:opacity .2s">';
        html += '<div style="flex:1">';
        html += '<div style="font-size:14px;font-weight:700;color:' + nameColor + ';margin-bottom:' + ((eq||ac) ? '6px' : '0') + '">' + w.name + '</div>';
        if (eq || ac) {
          html += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
          if (eq) html += '<span style="padding:2px 7px;border-radius:6px;border:1px solid var(--br);background:#0f1011;font-size:9px;color:' + (isDone ? '#4a5a4a' : 'var(--am)') + '">' + eq.name + '</span>';
          if (ac) html += '<span style="padding:2px 7px;border-radius:6px;border:1px solid var(--br);background:#0f1011;font-size:9px;color:' + (isDone ? '#4a5a4a' : 'var(--am)') + '">' + ac.name + '</span>';
          if (isDone && workSets > 0) html += '<span style="padding:2px 7px;border-radius:6px;border:1px solid rgba(80,140,80,.2);background:rgba(80,140,80,.08);font-size:9px;color:#6a8a6a">' + workSets + ' подх</span>';
          html += '</div>';
        }
        html += '</div>';
        html += statusEl;
        html += '</button>';
      });

      // Кнопка завершить — всегда видима
      html += '<div style="margin-top:12px">';
      if (doneCount === totalCount && totalCount > 0) {
        html += '<button onclick="Diary.finish()" class="btn btn-accent btn-full" style="border-radius:14px;font-size:14px;padding:14px;box-shadow:0 0 18px rgba(212,168,67,.3)">✓ Завершить тренировку</button>';
      } else {
        html += '<button onclick="Diary.finish()" style="width:100%;padding:13px;border-radius:14px;border:1px solid #2a2b2e;background:transparent;color:#A0A2A8;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:.5px">Завершить тренировку</button>';
      }
      html += '</div>';

      return html;
    }

    const ex = d.workout[d.activeIdx];
    if (!ex) return '';

    const wSets  = ex.sets.filter(s => s.type === 'work');
    const wmSets = ex.sets.filter(s => s.type === 'warmup');
    const ldSets = ex.sets.filter(s => s.type === 'leadup');
    const wTon   = workTonnage(ex);
    const pTon   = prevTonnage(ex);
    const timer  = State.timer;
    const p      = prevOf(ex.id);

    const exData      = Object.values(EXERCISES).flat().find(e => e.id === ex.id);
    const availGrips  = exData ? exGrips(exData) : GRIPS_LIST;
    const availEquip  = exData ? exEquip(exData) : EQUIPMENT_LIST;
    const availAccents = (exData && exData.accents) ? ACCENT_LIST.filter(a => exData.accents.includes(a.id)) : [];
    const gripObj     = availGrips.find(g => g.id === ex.grip);
    const equipObj    = availEquip.find(e => e.id === ex.equip);
    const accentObj   = availAccents.find(a => a.id === ex.accent);
    const tutShortMap = {normal:'Обычный', pause1:'Пауза 1с', pause3:'Пауза 3с', pause_mid:'Пауза в середине', negative3:'Негатив 3с', slow:'4-0-4'};
    const tutShort    = tutShortMap[ex.tut] || '';
    const workRpes    = wSets.filter(s => s.rpe).map(s => s.rpe);
    const maxRpe      = workRpes.length ? Math.max(...workRpes) : null;
    const canProgress = wSets.length >= p.s && wSets.length > 0
      && wSets.every(s => s.reps >= p.r)
      && workRpes.length === wSets.length && Math.max(...workRpes) <= 8;

    // Config key: движение_снаряд_хват_акцент_темп
    const configKey = [ex.id, ex.equip, ex.grip, ex.accent, ex.tut !== 'normal' ? ex.tut : null]
      .filter(Boolean).join('_');

    // Semantic line
    const semParts = [];
    if (accentObj) semParts.push(accentObj.name + ' грудь');
    else semParts.push(ex.muscle);
    if (gripObj) semParts.push(gripObj.name + ' хват');
    if (ex.tut !== 'normal') semParts.push(tutShort);
    const semLine = semParts.join(' · ');

    // Chips renderer
    const chips = (list, activeId, field) => list.map(item => {
      const on = activeId === item.id;
      return '<button onclick="Diary.updateExField(\'' + field + '\',\'' + item.id + '\')" style="padding:6px 12px;border-radius:16px;border:1px solid ' + (on?'var(--ac)':'var(--br)') + ';background:' + (on?'var(--ad)':'var(--sf)') + ';color:' + (on?'var(--ac)':'var(--mt)') + ';font-size:11px;cursor:pointer;font-family:inherit;font-weight:' + (on?'700':'400') + ';transition:all .15s">' + item.name + '</button>';
    }).join('');

    const tutChips = (activeId) => TUT_LIST.map(item => {
      const on = activeId === item.id;
      return '<button onclick="Diary.updateExField(\'tut\',\'' + item.id + '\')" style="padding:6px 12px;border-radius:16px;border:1px solid ' + (on?'var(--ac)':'var(--br)') + ';background:' + (on?'var(--ad)':'var(--sf)') + ';color:' + (on?'var(--ac)':'var(--mt)') + ';font-size:11px;cursor:pointer;font-family:inherit;font-weight:' + (on?'700':'400') + ';transition:all .15s">' + (tutShortMap[item.id]||item.name) + '</button>';
    }).join('');

    // Params block для overlay (только темп + отдых)
    const paramsBlock = () => {
      let h = '';
      if (exData && exData.notes && State.settings.hints) h += '<div style="font-size:10px;color:#9EAA8C;margin-bottom:12px;line-height:1.5">💡 ' + exData.notes + '</div>';

      // Темп
      if (State.settings.tempo) {
        h += '<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ТЕМП</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + tutChips(ex.tut) + '</div></div>';
      }

      // Отдых
      h += '<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ОТДЫХ</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(REST_LIST, ex.rest || '120', 'rest') + '</div></div>';

      // В overlay — дополнительно снаряд/хват/акцент для корректировки
      if (availEquip.length > 1) {
        h += '<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">СНАРЯД</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(availEquip, ex.equip, 'equip') + '</div></div>';
      }
      if (availAccents.length > 1) {
        h += '<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">АКЦЕНТ</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(availAccents, ex.accent, 'accent') + '</div></div>';
      }
      if (availGrips.length > 1) {
        h += '<div style="margin-bottom:12px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ХВАТ</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(availGrips, ex.grip, 'grip') + '</div></div>';
      }
      return h;
    };

    // ══════════════════════════════════════════════
    // SETUP SCREEN
    // ══════════════════════════════════════════════
    if (!ex.setupDone) {

      // ── Таблица эффектов ──────────────────────
      const GRIP_EFFECTS = {
        narrow:   'Акцент на трицепс',
        medium:   'Равномерная нагрузка',
        wide:     'Акцент на грудь · меньше нагрузки на трицепс',
        neutral:  'Снижение нагрузки на запястья',
        reverse:  'Акцент на бицепс',
        straight: 'Стандартная позиция',
      };
      const TUT_EFFECTS = {
        normal:    'Базовая сила · естественная скорость',
        pause1:    'Устранение инерции · стартовая сила',
        pause3:    'Максимальный контроль · сила из статики',
        pause_mid: 'Сила в слабой точке · контроль траектории',
        negative3: 'Время под нагрузкой · гипертрофия',
        slow:      'Максимальное напряжение во всей амплитуде',
      };
      const REST_EFFECTS = {
        '45':  'выносливость · плотность',
        '60':  'выносливость · плотность',
        '90':  'выносливость · плотность',
        '120': 'баланс силы и объёма',
        '180': 'баланс силы и объёма',
        '300': 'максимум силы · полный отдых',
      };
      const gripEffect = GRIP_EFFECTS[ex.grip] || null;
      const tutEffect  = TUT_EFFECTS[ex.tut]  || null;
      const restEffect = REST_EFFECTS[ex.rest || '120'] || null;
      const hasEffect  = gripEffect || tutEffect || restEffect;

      let html = '';
      html += '<button class="btn btn-ghost" style="margin-bottom:16px" onclick="State.diary.activeIdx=-1;App.render()">‹ Список</button>';
      html += '<span class="lbl">УПР ' + (d.activeIdx+1) + '/' + d.workout.length + ' · ' + ex.muscle.toUpperCase() + '</span>';
      html += '<div class="ttl" style="font-size:28px;margin-bottom:4px">' + ex.name + '</div>';

      // Конфигурация из планирования (снаряд / акцент)
      const planTags = [equipObj ? equipObj.name : null, accentObj ? accentObj.name : null].filter(Boolean);
      if (planTags.length) {
        html += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px">';
        planTags.forEach(tag => {
          html += '<span style="padding:3px 9px;border-radius:8px;border:1px solid var(--br2);background:var(--s2);font-size:10px;color:var(--ac)">' + tag + '</span>';
        });
        html += '</div>';
      } else {
        html += '<div style="margin-bottom:16px"></div>';
      }

      // ── Параметры техники ─────────────────────
      html += '<div class="card" style="padding:16px;margin-bottom:12px">';

      // 1. Хват
      if (availGrips.length > 1) {
        html += '<div style="margin-bottom:14px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ХВАТ</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(availGrips, ex.grip, 'grip') + '</div></div>';
      }

      // 2. Темп
      if (State.settings.tempo) {
        html += '<div style="margin-bottom:14px"><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ТЕМП</div>';
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + tutChips(ex.tut) + '</div></div>';
      }

      // 3. Отдых
      html += '<div><div style="font-size:9px;color:var(--sb);letter-spacing:2px;margin-bottom:6px">ОТДЫХ</div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px">' + chips(REST_LIST, ex.rest || '120', 'rest') + '</div></div>';

      html += '</div>';  // end params card

      // ── 5. Эффект ─────────────────────────────
      if (hasEffect) {
        html += '<div style="background:#0f1210;border:1px solid #1e2a1e;border-radius:12px;padding:12px 14px;margin-bottom:12px">';
        html += '<div style="font-size:9px;color:#4a6a4a;letter-spacing:2px;margin-bottom:8px">ЭФФЕКТ</div>';
        if (gripEffect && availGrips.length > 1) {
          html += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:' + (tutEffect || restEffect ? '6px' : '0') + '">';
          html += '<span style="font-size:9px;color:#3a5a3a;letter-spacing:1px;white-space:nowrap">ХВАТ</span>';
          html += '<span style="font-size:12px;color:#7aaa7a">→ ' + gripEffect + '</span></div>';
        }
        if (tutEffect) {
          html += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:' + (restEffect ? '6px' : '0') + '">';
          html += '<span style="font-size:9px;color:#3a5a3a;letter-spacing:1px;white-space:nowrap">ТЕМП</span>';
          html += '<span style="font-size:12px;color:#7aaa7a">→ ' + tutEffect + '</span></div>';
        }
        if (restEffect) {
          html += '<div style="display:flex;align-items:baseline;gap:8px">';
          html += '<span style="font-size:9px;color:#2a4a2a;letter-spacing:1px;white-space:nowrap">ОТДЫХ</span>';
          html += '<span style="font-size:12px;color:#5a8a5a">→ ' + restEffect + '</span></div>';
        }
        html += '</div>';
      }

      // История перенесена в Execution (после начала упражнения)

      // подсказка перенесена в экран выполнения

      html += '<button class="btn btn-accent btn-full" style="border-radius:14px;font-size:15px;padding:16px" onclick="Diary.startExercise()">▶ Начать упражнение</button>';
      return html;
    }

    // ══════════════════════════════════════════════
    // EXECUTION SCREEN
    // ══════════════════════════════════════════════
    let html = '';

    html += '<button class="btn btn-ghost" style="margin-bottom:12px" onclick="State.diary.activeIdx=-1;App.render()">‹ Список</button>';

    // ── Header ────────────────────────────────────
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    html += '<div>';
    html += '<span class="lbl">УПР ' + (d.activeIdx+1) + '/' + d.workout.length + ' · ' + ex.muscle.toUpperCase() + '</span>';
    html += '<div class="ttl" style="font-size:26px">' + ex.name + '</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-top:3px">';
    html += '<span style="font-size:11px;color:var(--sb)">' + semLine + (maxRpe ? ' · RPE ' + maxRpe : '') + '</span>';
    html += '<button onclick="State.diary.editOverlay=true;App.render()" style="background:none;border:none;color:var(--mt);cursor:pointer;font-size:13px;padding:0;line-height:1">✏️</button>';
    html += '</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">';
    [equipObj ? equipObj.name : null, accentObj ? accentObj.name : null, gripObj ? gripObj.name + ' хват' : null, ex.tut !== 'normal' ? tutShort : null]
      .filter(Boolean).forEach(tag => {
        html += '<span style="padding:2px 7px;border-radius:8px;border:1px solid var(--br);background:#0f1011;font-size:9px;color:var(--am)">' + tag + '</span>';
      });
    html += '</div>';
    html += '</div>';
    html += '<button class="btn btn-surface" style="font-size:11px;flex-shrink:0" onclick="State.modal={type:\'swap\',data:{muscle:\'' + ex.muscle + '\',exId:\'' + ex.id + '\'}};App.renderModal()">⇄ Замена</button>';
    html += '</div>';

    // ── История lookup ────────────────────────────
    const histEntry = HISTORY[configKey] || null;
    const histWork   = histEntry ? histEntry.sets.filter(s => s.type === 'work') : [];
    const histTon    = histWork.reduce((a, s) => a + s.weight * s.reps, 0);
    const histAllTon = histEntry ? histEntry.sets.reduce((a, s) => a + s.weight * s.reps, 0) : 0;
    const curAllTon  = ex.sets.reduce((a, s) => a + s.weight * s.reps, 0);


    // ─── Таблица ПРОШЛАЯ | ТЕКУЩАЯ ──────────────────
    const SET_COL = {
      warmup: { label:'РЗМ', col:'#6ac882' },
      leadup: { label:'ПДВ', col:'#6aaae0' },
      work:   { label:'РАБ', col:'#d4a843' },
    };
    const RPE_COL  = '#9b87f0';
    const histSets = histEntry ? histEntry.sets : [];
    const maxRows  = Math.max(histSets.length, ex.sets.length);
    const rowEditIdx = State.diary.rowEditIdx;

    const rBtnSt = (col) =>
      'width:30px;height:30px;border-radius:7px;border:1px solid #2a2a30;background:#0d0e0f;color:' +
      col + ';font-size:17px;cursor:pointer;line-height:1;font-family:inherit;flex-shrink:0';
    const rInpSt =
      'text-align:center;background:#0a0b0c;border:1px solid #222228;border-radius:6px;' +
      'color:#EAEAEA;font-size:14px;font-weight:700;padding:3px 2px;font-family:inherit;flex:1;min-width:0';

    html += '<div style="background:#111214;border:1px solid #252528;border-radius:12px;overflow:hidden;margin-bottom:10px">';

    // Шапка
    html += '<div style="display:grid;grid-template-columns:1fr 1px 1fr;border-bottom:1px solid #252528">';
    html += '<div style="padding:10px 14px;display:flex;align-items:center;gap:8px">';
    html += '<span style="font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1px">ПРОШЛАЯ</span>';
    if (histEntry) html += '<span style="font-size:10px;color:rgba(212,168,67,.55)">' + histEntry.date + '</span>';
    else           html += '<span style="font-size:10px;color:#A0A2A8">нет данных</span>';
    html += '</div>';
    html += '<div style="background:#252528"></div>';
    html += '<div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between">';
    html += '<span style="font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1px">ТЕКУЩАЯ</span>';
    html += '<button onclick="State.modal={type:\'note\'};App.renderModal()" style="background:none;border:none;cursor:pointer;font-size:17px;padding:2px;line-height:1;opacity:' + (ex.note ? '1' : '.55') + '" title="Заметка">📝</button>';
    html += '</div>';
    html += '</div>';

    // Строки
    if (maxRows === 0) {
      html += '<div style="display:grid;grid-template-columns:1fr 1px 1fr">';
      html += '<div style="padding:22px 14px;font-size:12px;color:#A0A2A8">—</div>';
      html += '<div style="background:#252528"></div>';
      html += '<div style="padding:22px 14px;font-size:12px;color:#B4B6BC">Добавь первый подход ↓</div>';
      html += '</div>';
    } else {
      for (let ri = 0; ri < maxRows; ri++) {
        const hs = histSets[ri] || null;
        const cs = ex.sets[ri]  || null;
        const hc = hs ? (SET_COL[hs.type] || SET_COL.work) : null;
        const cc = cs ? (SET_COL[cs.type] || SET_COL.work) : null;
        const isEditing = rowEditIdx === ri && !!cs;
        const isNew     = ri === ex.sets.length - 1 && !!cs;
        const bTop = ri > 0 ? 'border-top:1px solid #1e1e24;' : '';
        const rowBg = isEditing ? 'rgba(212,168,67,.04)' : 'transparent';

        html += '<div class="' + (isNew ? 'fadein' : '') + '" style="' + bTop + 'background:' + rowBg + '">';
        html += '<div style="display:grid;grid-template-columns:1fr 1px 1fr">';

        // ── История (слева) ─────────────────────────
        html += '<div style="padding:11px 12px 11px 14px;display:flex;align-items:center;gap:8px">';
        if (hs) {
          html += '<span style="font-size:9px;font-weight:700;color:' + hc.col + ';width:22px;flex-shrink:0">' + hc.label + '</span>';
          html += '<span style="font-size:13px;color:#B4B6BC">' + hs.weight + '×' + hs.reps + '</span>';
          if (hs.rpe) html += '<span style="font-size:10px;color:' + RPE_COL + ';margin-left:auto">RPE ' + hs.rpe + '</span>';
        } else {
          html += '<span style="font-size:15px;color:#333338">—</span>';
        }
        html += '</div>';

        html += '<div style="background:#1e1e24"></div>';

        // ── Текущая (справа) — тап = редактировать ───
        html += '<div onclick="Diary.openRowEdit(' + ri + ')" style="padding:11px 12px 11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;' +
          (isEditing ? 'background:rgba(212,168,67,.04)' : '') +
          '" ontouchstart="State._swipeX=event.touches[0].clientX" ' +
          'ontouchend="if(State._swipeX - event.changedTouches[0].clientX > 60){event.stopPropagation();Diary.removeSet(' + ri + ')}">';
        if (cs) {
          html += '<span style="font-size:9px;font-weight:700;color:' + cc.col + ';width:22px;flex-shrink:0">' + cc.label + '</span>';
          html += '<span style="font-size:13px;color:#EAEAEA;font-weight:600">' + cs.weight + '×' + cs.reps + '</span>';
          if (cs.rpe) html += '<span style="font-size:10px;color:' + RPE_COL + ';font-weight:600;margin-left:4px">RPE ' + cs.rpe + '</span>';
          html += '<button onclick="event.stopPropagation();Diary.removeSet(' + ri + ')" style="background:none;border:none;color:#7E8088;cursor:pointer;font-size:13px;padding:2px;margin-left:auto;flex-shrink:0">✕</button>';
        } else {
          html += '<span style="font-size:15px;color:#333338">—</span>';
        }
        html += '</div>';

        html += '</div>'; // end grid row

        // ── Панель редактирования ────────────────────
        if (isEditing && cs) {
          html += '<div class="fadein" style="padding:10px 14px 12px;border-top:1px solid #1e1e24;background:#0a0b0c">';

          // Тип
          html += '<div style="display:flex;gap:5px;margin-bottom:8px">';
          ['warmup','leadup','work'].forEach(t => {
            const tc2 = SET_COL[t];
            const active = cs.type === t;
            html += '<div onclick="Diary.updateSetField(' + ri + ',\'type\',\'' + t + '\')" style="flex:1;text-align:center;padding:5px 2px;border-radius:7px;cursor:pointer;user-select:none;' +
              'border:1px solid ' + (active ? tc2.col + '55' : '#252528') + ';' +
              'background:' + (active ? tc2.col + '18' : 'transparent') + '">' +
              '<span style="font-size:10px;font-weight:700;color:' + (active ? tc2.col : '#7E8088') + '">' + tc2.label + '</span></div>';
          });
          html += '</div>';

          // Вес + Повт
          html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';

          html += '<div style="min-width:0">';
          html += '<div style="font-size:8px;color:#A0A2A8;letter-spacing:1px;margin-bottom:4px">ВЕС, кг</div>';
          html += '<div style="display:flex;align-items:center;gap:3px;overflow:hidden">';
          html += '<button onclick="Diary.updateSetField(' + ri + ',\'weight\',' + Math.max(0, cs.weight-2.5) + ')" style="' + rBtnSt(cc.col) + '">−</button>';
          html += '<input type="text" inputmode="decimal" value="' + cs.weight + '" onfocus="this.select()" onblur="Diary.updateSetField(' + ri + ',\'weight\',parseFloat(this.value.replace(\',\',\'.\'))||0)" style="' + rInpSt + '">';
          html += '<button onclick="Diary.updateSetField(' + ri + ',\'weight\',' + (cs.weight+2.5) + ')" style="' + rBtnSt(cc.col) + '">+</button>';
          html += '</div></div>';

          html += '<div style="min-width:0">';
          html += '<div style="font-size:8px;color:#A0A2A8;letter-spacing:1px;margin-bottom:4px">ПОВТОРЫ</div>';
          html += '<div style="display:flex;align-items:center;gap:3px;overflow:hidden">';
          html += '<button onclick="Diary.updateSetField(' + ri + ',\'reps\',' + Math.max(1, cs.reps-1) + ')" style="' + rBtnSt(cc.col) + '">−</button>';
          html += '<input type="number" inputmode="numeric" value="' + cs.reps + '" onfocus="this.select()" onchange="Diary.updateSetField(' + ri + ',\'reps\',+this.value)" style="' + rInpSt + '">';
          html += '<button onclick="Diary.updateSetField(' + ri + ',\'reps\',' + (cs.reps+1) + ')" style="' + rBtnSt(cc.col) + '">+</button>';
          html += '</div></div>';

          html += '</div>';

          // RPE кнопки
          html += '<div style="display:flex;gap:5px">';
          [6,7,8,9,10].forEach(v => {
            const active = cs.rpe === v;
            html += '<button onclick="Diary.setRpeForRow(' + ri + ',' + v + ')" style="flex:1;padding:6px 0;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;' +
              'border:1px solid ' + (active ? 'rgba(155,135,240,.45)' : '#252528') + ';' +
              'background:' + (active ? 'rgba(155,135,240,.15)' : '#111214') + ';' +
              'color:' + (active ? RPE_COL : '#7E8088') + '">' + v + '</button>';
          });
          html += '</div>';

          html += '</div>'; // end edit panel
        }

        html += '</div>'; // end row wrapper
      }
    }

    // ── Тоннаж — последняя строка таблицы ───────────
    if (histAllTon > 0 || curAllTon > 0) {
      const pct = (histAllTon > 0 && curAllTon > 0)

      html += '<div style="font-size:10px;color:var(--sb)">' + s.hint + '</div></div></div>';
    });

    html += '<div style="height:1px;background:#111;margin:16px -20px 16px"></div>';
    html += '<span class="lbl">ТВОЙ СТЕК</span>';
    html += '<div class="ttl" style="margin-bottom:16px">Биохакинг</div>';

    html += '<div style="background:#171819;border:1px solid #2a2b2e;border-radius:12px;padding:14px;margin-bottom:16px;display:flex;gap:12px">';
    html += '<span style="font-size:18px">◈</span><div>';
    html += '<span class="lbl" style="color:#9EAA8C">ИИ-РЕКОМЕНДАЦИЯ</span>';
    html += '<div style="font-size:12px;color:#C0C2C8;line-height:1.6">На силовом цикле добавь бета-аланин 3.2г/день — буферизирует лактат при высоком RPE.</div>';
    html += '</div></div>';

    html += '<span class="lbl">ДОБАВКИ</span>';
    State.supps.forEach((s, i) => {
      html += '<div onclick="State.supps[' + i + '].on=!State.supps[' + i + '].on;App.render()" style="background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;opacity:' + (s.on?1:.45) + '">';
      html += '<div class="tgl' + (s.on?' on':'') + '" style="background:' + (s.on?s.col+'33':'#111') + ';border:1.5px solid ' + (s.on?s.col:'#222') + '">';
      html += '<div class="tknob" style="background:' + (s.on?s.col:'#333') + ';left:' + (s.on?'21px':'3px') + '"></div></div>';
      html += '<div style="flex:1"><div style="display:flex;align-items:center;gap:7px;margin-bottom:2px">';
      html += '<span style="font-size:14px;font-weight:700;color:' + (s.on?'#fff':'#444') + '">' + s.name + '</span>';
      html += '<span style="font-size:8px;color:' + s.col + ';border:1px solid ' + s.col + '44;padding:1px 5px;border-radius:4px;letter-spacing:1px">' + s.tag + '</span>';
      html += '</div><div style="font-size:11px;color:var(--sb)">' + s.dose + ' · ' + s.timing + '</div></div></div>';
    });

    html += '<div style="height:1px;background:#111;margin:16px -20px"></div>';
    html += '<button onclick="State.modal={type:\'dark\'};App.renderModal()" style="width:100%;background:linear-gradient(135deg,#0d0814,#150d20);border:1px solid #3d1a5a;border-radius:14px;padding:18px 20px;cursor:pointer;text-align:left;font-family:inherit;display:flex;align-items:center;gap:16px;margin-top:16px">';
    html += '<div style="width:48px;height:48px;border-radius:12px;background:#1a0a2a;border:1px solid #4c1d95;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🖤</div>';
    html += '<div><div style="font-size:9px;color:var(--pu);letter-spacing:3px;margin-bottom:5px">ELITE · ЗАКРЫТЫЙ</div>';
    html += '<div style="font-size:16px;font-weight:700;color:#d8b4fe;margin-bottom:4px">Тёмная сторона</div>';
    html += '<div style="font-size:11px;color:#A0A2A8">ГЗТ · Курсы · Пептиды · Анализы</div></div>';
    html += '<span style="color:#787A82;font-size:20px;margin-left:auto">›</span></button>';
    return html;
  },
};

// ─────────────── MODALS ───────────────
const Modals = {
  swap() {
    const {muscle, exId} = State.modal.data;
    const alts = (EXERCISES[muscle] || []).filter(e => e.id !== exId);
    let html = '<div class="modal-wrap"><div class="modal-hdr">';
    html += '<div><span class="lbl">ЗАМЕНА · ' + muscle + '</span><div style="font-size:16px;font-weight:700">Выбери альтернативу</div></div>';
    html += '<button class="modal-close" onclick="App.closeModal()">✕</button></div>';
    html += '<div class="modal-body">';
    alts.forEach(ex => {
      const p = prevOf(ex.id);
      html += '<button onclick="Diary.swapExercise(\'' + ex.id + '\',\'' + muscle + '\')" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--br);background:var(--sf);text-align:left;cursor:pointer;font-family:inherit;margin-bottom:8px">';
      html += '<div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px">' + ex.name + '</div>';
      html += '<div style="font-size:10px;color:var(--sb)">Прошлый: ' + p.w + 'кг×' + p.r + ' · ' + p.s + ' подх</div></button>';
    });
    html += '</div></div>';
    return html;
  },

  note() {
    return '<div class="modal-wrap"><div class="modal-hdr"><div style="font-size:16px;font-weight:700">💬 Заметка к упражнению</div><button class="modal-close" onclick="App.closeModal()">✕</button></div><div class="modal-body" style="display:flex;flex-direction:column;gap:12px"><textarea id="note-input" style="height:140px" placeholder="Держать лопатки, следить за локтями..."></textarea><div style="display:flex;gap:10px"><button class="btn btn-surface" style="flex:1;padding:12px" onclick="App.closeModal()">Отмена</button><button class="btn btn-accent" style="flex:2;padding:12px;border-radius:12px" onclick="Diary.saveNote(document.getElementById(\'note-input\').value)">Сохранить</button></div></div></div>';
  },


  program() {
    const p = State.modal.data;
    const hc = hlColor(p.hl);
    let html = '<div class="modal-wrap"><div class="modal-hdr"><button class="modal-close" onclick="App.closeModal()">‹ Назад</button></div>';
    html += '<div class="modal-body">';
    html += '<div style="background:' + (p.hl==='dark'?'#0d0814':'var(--sf)') + ';border:1px solid ' + (p.hl==='dark'?'#3d1a5a':'var(--br)') + ';border-radius:16px;padding:20px;margin-bottom:14px">';
    html += '<div style="font-size:24px;font-weight:700;color:' + (p.hl==='dark'?'#d8b4fe':'#fff') + ';margin-bottom:4px">' + p.name + '</div>';
    html += '<div style="font-size:11px;color:var(--sb);margin-bottom:16px">' + p.author + '</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">';
    [['ДНИ',p.days],['НЕДЕЛЬ',p.weeks],['УРОВЕНЬ',p.level]].forEach(([l,v]) => {
      html += '<div style="background:#111;border-radius:10px;padding:10px;text-align:center"><span class="lbl">' + l + '</span><div style="font-size:14px;font-weight:700">' + v + '</div></div>';
    });
    html += '</div>';
    html += '<span class="lbl">СОВМЕСТИМОСТЬ</span>';
    html += '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px">';
    p.tags.forEach(t => {
      html += '<span style="font-size:10px;color:' + tagColor(t) + ';border:1px solid ' + tagColor(t) + '55;padding:4px 10px;border-radius:6px">' + t + '</span>';
    });
    html += '</div>';
    html += '<span class="lbl">СТРУКТУРА НЕДЕЛИ</span>';
    html += '<div style="display:flex;gap:5px">';
    ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach((day, i) => {
      const tr = i < p.days;
      html += '<div style="flex:1;text-align:center"><div style="height:32px;border-radius:7px;margin-bottom:4px;background:' + (tr?(p.hl==='dark'?'rgba(168,85,247,.15)':'var(--ad)'):'#111') + ';border:1px solid ' + (tr?(p.hl==='dark'?'rgba(168,85,247,.3)':'var(--ab)'):'var(--br)') + ';display:flex;align-items:center;justify-content:center;font-size:10px;color:' + (tr?hc:'#222') + '">' + (tr?'●':'·') + '</div>';
      html += '<span style="font-size:8px;color:#787A82">' + day + '</span></div>';
    });
    html += '</div></div>';
    html += '<button onclick="alert(\'Программа «' + p.name + '» добавлена!\')" style="width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;background:' + (p.hl==='dark'?'linear-gradient(135deg,#4c1d95,#6d28d9)':'linear-gradient(135deg,var(--ac),#a8d900)') + ';color:' + (p.hl==='dark'?'#fff':'#000') + '">' + (p.hl==='dark'?'🖤 Начать':'▶ Начать программу') + '</button>';
    html += '</div></div>';
    return html;
  },

  dark() {
    if (!State.darkUnlocked) {
      return '<div class="modal-wrap" style="justify-content:center;align-items:center"><div style="padding:40px 28px;text-align:center;max-width:360px"><div style="font-size:56px;margin-bottom:20px">🖤</div><div style="font-size:22px;font-weight:700;margin-bottom:8px">Тёмная сторона</div><div style="font-size:12px;color:#B0B2B8;line-height:1.8;margin-bottom:28px">Образовательный раздел о фармакологии и спортивной медицине.<br><br>Информация предоставляется исключительно в образовательных целях. Вы принимаете решения самостоятельно.</div><button onclick="State.darkUnlocked=true;App.renderModal()" style="background:linear-gradient(135deg,#4c1d95,#6d28d9);border:none;border-radius:12px;padding:14px 32px;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-bottom:12px">Я понимаю · Войти</button><button onclick="App.closeModal()" style="background:none;border:none;color:#333;font-size:12px;cursor:pointer;font-family:inherit">Отмена</button></div></div>';
    }
    const items = [
      {i:'◈', t:'ГЗТ / ТРТ',            d:'Протоколы, мониторинг, дозировки', c:'#a855f7'},
      {i:'◎', t:'Курсовое планирование', d:'Длительность, ПКТ, восстановление', c:'#9333ea'},
      {i:'◇', t:'Пептиды',               d:'Стеки, тайминг, совместимость',     c:'#7c3aed'},
      {i:'⬡', t:'Анализы крови',         d:'Что сдавать, нормы для атлетов',   c:'#6d28d9'},
      {i:'▣', t:'Антиэстрогены / САРМ',  d:'Дозировки, протоколы',             c:'#5b21b6'},
    ];
    let html = '<div class="modal-wrap"><div class="modal-hdr"><div><div style="font-size:9px;color:var(--pu);letter-spacing:3px;margin-bottom:4px">ELITE · ЗАКРЫТЫЙ</div><div style="font-size:20px;font-weight:700">🖤 Тёмная сторона</div></div><button class="modal-close" onclick="App.closeModal()">✕</button></div>';
    html += '<div class="modal-body"><div style="background:#0d0814;border:1px solid #2d1a4a;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#6d28d9;line-height:1.5">⚠️ Образовательный формат. Проконсультируйтесь с врачом.</div>';
    items.forEach(it => {
      html += '<div style="background:#0a0810;border:1px solid #1a1025;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px">';
      html += '<div style="width:40px;height:40px;border-radius:10px;background:' + it.c + '22;border:1px solid ' + it.c + '44;display:flex;align-items:center;justify-content:center;font-size:18px;color:' + it.c + ';flex-shrink:0">' + it.i + '</div>';
      html += '<div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px">' + it.t + '</div><div style="font-size:11px;color:#A0A2A8">' + it.d + '</div></div>';
      html += '<span style="color:#787A82;font-size:18px">›</span></div>';
    });
    html += '</div></div>';
    return html;
  },
};

// Store program data globally for modal access
PROGRAMS.forEach(p => { window['_prog' + p.id] = p; });

// ─────────────── START ───────────────
Storage.restore();
App.render();
</script>
